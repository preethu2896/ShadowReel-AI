version: "3.9"

services:
  # ── Nginx Gateway ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: shadowreel_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shadowreel_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shadowreel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_prod_password}
      POSTGRES_DB: ${POSTGRES_DB:-shadowreel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache / Msg Broker ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shadowreel_redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend API ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowreel_api
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      COMFYUI_HOST: ${COMFYUI_HOST:-comfyui_cluster}
      COMFYUI_PORT: 8188
    volumes:
      - /mnt/ebs/outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  # ── Celery Image Worker ──────────────────────────────────────
  worker_image:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowreel_worker_image
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /mnt/ebs/outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q generation --max-tasks-per-child=50 --max-memory-per-child=4000000

  # ── Celery Video Worker (GPU Node) ───────────────────────────
  worker_video:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowreel_worker_video
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      COMFYUI_HOST: ${COMFYUI_HOST:-comfyui_cluster}
      COMFYUI_PORT: 8188
    volumes:
      - /mnt/ebs/outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=1 -Q video --max-tasks-per-child=10 --max-memory-per-child=12000000
    deploy:
      mode: replicated
      replicas: 1
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Celery Documentary Orchestration Worker ──────────────────
  worker_documentary:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowreel_worker_doc
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      COMFYUI_HOST: ${COMFYUI_HOST:-comfyui_cluster}
      COMFYUI_PORT: 8188
    volumes:
      - /mnt/ebs/outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q documentary --max-tasks-per-child=20 --max-memory-per-child=6000000

  # ── Celery Flower (Monitoring Dashboard) ─────────────────────
  flower:
    image: mher/flower:2.0
    container_name: shadowreel_flower
    restart: always
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: shadowreel_frontend
    restart: always
    env_file: .env.production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
