# ==============================================================================
# ShadowReel AI — Nginx SSL & Production Proxy Configuration
# ==============================================================================
# Handles: HTTP-to-HTTPS redirect, Let's Encrypt/Certbot ACME challenges,
#          SSL termination (HTTP/2), Cloudflare reverse proxy headers, and WebSocket (WSS) routing.
# ==============================================================================

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance Tuning
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version details for security

    # Connection and Request Size Limits (Important for uploading large videos/models)
    client_max_body_size 250M;
    client_body_buffer_size 128k;

    # Modern Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Dynamic Connection Upgrade for WebSockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # SSL Cache & Parameter Tuning
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern Cryptography Configuration (Mozilla SSL Config Generator - Intermediate Profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (HTTP Strict Transport Security) - Enable in production (1 year)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Core Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

    # Upstream Definitions (Docker container-network names or localhost if deployed bare-metal)
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_nextjs {
        server frontend:3000;
        keepalive 32;
    }

    # --------------------------------------------------------------------------
    # HTTP Port 80 — ACME Challenges and HTTPS Redirects
    # --------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name shadowreel.ai www.shadowreel.ai api.shadowreel.ai;

        # Let's Encrypt / Certbot Verification Path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Global Redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --------------------------------------------------------------------------
    # HTTPS Port 443 — shadowreel.ai & www.shadowreel.ai (Frontend Web App)
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name shadowreel.ai www.shadowreel.ai;

        # SSL Certificates (Managed via Certbot/Cloudflare)
        ssl_certificate /etc/letsencrypt/live/shadowreel.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shadowreel.ai/privkey.pem;

        # Cloudflare Integration: Log real client IP instead of proxy IP
        # Enable if deploying behind Cloudflare proxy
        # set_real_ip_from 103.21.244.0/22;
        # set_real_ip_from 103.31.4.0/22;
        # set_real_ip_from 104.16.0.0/13;
        # set_real_ip_from 104.24.0.0/14;
        # set_real_ip_from 172.64.0.0/13;
        # set_real_ip_from 173.245.48.0/20;
        # set_real_ip_from 188.114.96.0/20;
        # set_real_ip_from 190.93.240.0/20;
        # set_real_ip_from 197.234.240.0/22;
        # set_real_ip_from 198.41.128.0/17;
        # real_ip_header CF-Connecting-IP;

        # Frontend Next.js Standalone
        location / {
            proxy_pass http://frontend_nextjs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-SSL on;
            proxy_set_header X-Forwarded-Port 443;
        }

        # Optimized CDN Serving for static media directory
        location /static/ {
            proxy_pass http://api_backend/static/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            expires 30d;
            add_header Cache-Control "public, no-transform, immutable";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
        }
    }

    # --------------------------------------------------------------------------
    # HTTPS Port 443 — api.shadowreel.ai (FastAPI & WebSockets)
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.shadowreel.ai;

        # SSL Certificates (Managed via Certbot/Cloudflare)
        ssl_certificate /etc/letsencrypt/live/shadowreel.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shadowreel.ai/privkey.pem;

        # Enable if deploying behind Cloudflare proxy
        # set_real_ip_from 103.21.244.0/22;
        # ...
        # real_ip_header CF-Connecting-IP;

        # WebSocket Secure (wss://) Handshake & Streaming Location
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Prevent Nginx from closing long-lived connections for slow AI video renders
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            tcp_nodelay on;
        }

        # API Endpoints
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Slow AI task timeout handling
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
